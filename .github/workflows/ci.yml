name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # Pin Flutter (and its bundled Dart formatter) so the
          # Format-check step is deterministic and not sensitive to
          # Flutter stable-channel rotations.
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - run: flutter --version

      - name: Install
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test
        run: flutter test
